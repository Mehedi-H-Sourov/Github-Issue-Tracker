<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Issues</title>
    <!-- daisy and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- link css styles-->
    <link rel="stylesheet" href="./styles/tailwind.init.css">
</head>

<body>
    <header class="bg-base-100 shadow-sm">
        <div class=" flex-col gap-3 sm:flex-row navbar">
            <div class="flex-1 flex items-center gap-3 ">
                <img src="assets/github-logo.png" alt="Github logo" class="w-10">
                <h2 class=" text-xl font-bold">GitHub Issues Tracker</h2>
            </div>
            <!-- search functionality -->

            <div class="flex gap-1">
                <input id="input-search" type="search" placeholder=" Search issues..."
                    class="input input-bordered w-24 md:w-auto" />
                <button id="btn-search" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i>
                    Search</button>
            </div>
        </div>
    </header>

    <main class="w-11/12 mx-auto">

        <!-- button container -->
        <section class="shadow-md flex gap-5 my-4 p-4">

            <button onclick="toggleStyle('btn-all')" id="btn-all" class="btn btn-primary px-8">All</button>
            <button onclick="toggleStyle('btn-open')" id="btn-open" class="btn px-8">Open</button>
            <button onclick="toggleStyle('btn-close')" id="btn-close" class="btn px-8">Closed</button>

        </section>

        <!-- Issues + Open + Closed -->

        <section class="issues-count-section shadow rounded p-5 mt-4 ">

            <div class="flex flex-col sm:flex-col sm:items-left md:flex-row justify-between items-start gap-4">

                <!-- Issue count -->
                <div class="flex items-center gap-3">

                    <img src="./assets/Aperture.png" alt="Issues dashboard icon" class="w-12 h-12">

                    <div>
                        <h2 class="text-xl font-bold">
                            <span id="count-of-issues"></span> Issues
                        </h2>
                        <p class="text-slate-500">Track and manage your project issues</p>


                    </div>

                </div>

                <!-- Status indicators -->
                <div class="flex gap-6">

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-green-500"></span>
                        <p>Open</p>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                        <p>Closed</p>
                    </div>

                </div>

            </div>
        </section>



        <!-- Issue card containers -->
        <section>


            <div id="all-issues-container"
                class="bg-white shadow-2xl grid sm:gap-4 mt-3 p-3 md:grid-cols-3  lg:grid-cols-4">

            </div>



            <!-- data will be loaded here automatically by JS -->




        </section>




        <!-- Loading Spinner  -->
        <section id="loading-spinner" class="loading-spinner h-[60vh] flex justify-center items-center hidden">
            <span class="loading loading-dots loading-xl"></span>
        </section>

        <!-- Showing Modal -->
        <dialog id="modal_details" class="modal">
            <div class="modal-box">
                <div id="details-container" class="space-y-4">


                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>


    <script src="./script/issue.js"></script>
</body>

</html>
